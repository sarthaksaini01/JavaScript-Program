<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
        }

        nav button {
            color: white;
            background: none;
            border: none;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        nav button:hover {
            color: yellow;
        }

        .section {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        .project img {
            width: 200px;
            height: 150px;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button.submit {
            background: #333;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- Navigation -->
<nav>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('about')">About</button>
    <button onclick="showPage('projects')">Projects</button>
    <button onclick="showPage('contact')">Contact</button>
</nav>

<!-- Home -->
<div id="home" class="section active">
    <h1>Welcome to My Portfolio</h1>
    <p>I am a Web Developer 👨‍💻</p>
    <button onclick="welcomeMsg()">Click Me</button>
    <p id="msg"></p>
</div>

<!-- About -->
<div id="about" class="section">
    <h1>About Me</h1>
    <p>I am learning HTML, CSS and JavaScript.</p>
</div>

<!-- Projects -->
<div id="projects" class="section">
    <h1>My Projects</h1>

    <div class="project">
        <img src="https://via.placeholder.com/200x150">
        <h3>Birthday Invitation Page</h3>
    </div>

    <div class="project">
        <img src="https://via.placeholder.com/200x150">
        <h3>School Website</h3>
    </div>

    <div class="project">
        <img src="https://via.placeholder.com/200x150">
        <h3>Login Form</h3>
    </div>

    <h2>Project Screenshot</h2>
    <img src="https://via.placeholder.com/300x200">
</div>

<!-- Contact -->
<div id="contact" class="section">
    <h1>Contact Me</h1>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <button class="submit" onclick="sendMsg()">Send</button>

    <p id="response"></p>
</div>

<!-- JavaScript -->
<script>
    function showPage(pageId) {
        let sections = document.querySelectorAll('.section');
        sections.forEach(sec => sec.classList.remove('active'));

        document.getElementById(pageId).classList.add('active');
    }

    function welcomeMsg() {
        document.getElementById("msg").innerHTML = "Welcome to my portfolio!";
    }

    function sendMsg() {
        document.getElementById("response").innerHTML = "Message Sent!";
    }
</script>

</body>
</html>
